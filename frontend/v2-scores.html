<!DOCTYPE html><html lang=zh-CN><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1.0"><title>рҹ“Ҡ V2иҜ„еҲҶеј•ж“Һ - иӮЎзҘЁжҷәиғҪеҲҶжһҗ v2</title>
<style>
:root{--bg1:#0a0e17;--bg2:#111827;--bg3:#161d2a;--bg4:#1c2538;--bg6:#1a2235;--bd:#1e293b;--accent:#e94560;--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--h:56px;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg1);color:var(--t1);overflow-y:auto}
.top{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 24px;height:var(--h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.top .l{display:flex;align-items:center;gap:12px}.top .l a{color:var(--accent);text-decoration:none;font-size:.85em}
.top .r{font-size:.82em;color:var(--t3);display:flex;gap:12px;align-items:center}
h1{font-size:1.1em;font-weight:600}.c{max-width:1440px;margin:0 auto;padding:16px}
.card{background:var(--bg3);border-radius:var(--r);border:1px solid var(--bd);padding:16px;margin-bottom:12px}
.card h3{font-size:.85em;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.bar input,.bar select{background:var(--bg6);border:1px solid var(--bd);color:var(--t1);padding:6px 10px;border-radius:6px;font-size:.82em;height:34px}
.bar .q{flex:1;min-width:120px;max-width:200px}
.bar .sm{margin-left:auto;font-size:.82em;color:var(--t3);white-space:nowrap}
.b1{padding:6px 14px;border-radius:6px;border:none;color:#fff;cursor:pointer;font-size:.82em;background:var(--accent)}.b1:hover{opacity:.85}
.bg{background:#065f46}.br{background:#0f3460}.bd{background:#7f1d1d}.by{background:#78350f}
table{width:100%;border-collapse:collapse;font-size:.82em}
th,td{padding:6px 7px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
th{color:var(--t3);font-weight:600;position:sticky;top:0;background:var(--bg3);cursor:pointer;user-select:none}
th:hover{color:var(--t1)}th.srt{color:var(--accent)}tr:hover td{background:var(--bg4)}
.sb{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.72em;font-weight:600}
.sb1{background:#047857;color:#a7f3d0}.sb2{background:#065f46;color:#6ee7b7}.sb3{background:#78350f;color:#fbbf24}.sb4{background:#1e293b;color:#94a3b8}.sb5{background:#7f1d1d;color:#fca5a5}
.pg{display:flex;gap:4px;justify-content:center;align-items:center;margin-top:10px;flex-wrap:wrap}
.pg button{padding:4px 10px;border-radius:4px;border:1px solid var(--bd);background:var(--bg6);color:var(--t2);cursor:pointer;font-size:.78em}
.pg button:hover{background:var(--bg4)}.pg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.pg .info{font-size:.75em;color:var(--t3);margin-left:6px}

/* еёӮеңәзҠ¶жҖҒйқўжқҝ */
.mkt-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.mkt-item{text-align:center;padding:10px 6px;background:var(--bg4);border-radius:6px;border:1px solid var(--bd)}
.mkt-item .v{font-size:1.3em;font-weight:700;margin:4px 0}
.mkt-item .l{font-size:.7em;color:var(--t3)}

/* еӯЈиҠӮж Үзӯҫ */
.season-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.78em;font-weight:600}
.summer{background:#04785722;color:#6ee7b7;border:1px solid #047857}
.autumn{background:#78350f22;color:#fbbf24;border:1px solid #78350f}
.winter{background:#1e293b22;color:#94a3b8;border:1px solid #1e293b}
.chaos{background:#3b076422;color:#c084fc;border:1px solid #3b0764}
.spring{background:#0f346022;color:#60a5fa;border:1px solid #0f3460}

/* ж“ҚдҪңе»әи®®еҚЎзүҮ */
.advice-box{padding:10px 14px;border-radius:6px;margin-top:8px;font-size:.82em}
.advice-buy{background:#04785722;border:1px solid #047857;color:#6ee7b7}
.advice-cautious{background:#78350f22;border:1px solid #78350f;color:#fbbf24}
.advice-sell{background:#7f1d1d22;border:1px solid #7f1d1d;color:#fca5a5}
.advice-wait{background:#1e293b22;border:1px solid #1e293b;color:#94a3b8}

/* еӣ еӯҗеҫ®жҹұ */
.lb-bar{display:flex;align-items:center;gap:6px}
.lb-bar .l{font-size:.75em;color:var(--t3);min-width:28px}
.lb-bar .bar-bg{flex:1;height:6px;background:var(--bg6);border-radius:3px;overflow:hidden}
.lb-bar .bar-fill{height:100%;border-radius:3px;transition:width .3s}

@media(max-width:768px){.mkt-grid{grid-template-columns:1fr 1fr}.c{padding:10px}}
</style>
</head><body>
<div class=top>
<div class=l><a href=/stock-v2/>вҶҗ иҝ”еӣһ</a><h1>рҹ“Ҡ V2иҜ„еҲҶеј•ж“Һ</h1></div>
<div class=r><span id=mktBadge></span><span id=topDate></span></div>
</div>
<div class=c>

<!-- еёӮеңәзҠ¶жҖҒ & ж“ҚдҪңе»әи®® -->
<div class=card>
<h3>рҹ“Ҳ еҪ“еүҚеёӮеңәзҠ¶жҖҒ</h3>
<div class=mkt-grid id=mktGrid></div>
<div id=adviceBox></div>
</div>

<!-- иҜ„еҲҶеҲ—иЎЁ -->
<div class=card>
<h3>рҹ“Ӣ зӣ‘жҺ§жұ иҜ„еҲҶжҺ’иЎҢпјҲV2ж–°еј•ж“Һпјү</h3>
<div class=bar>
<input class=q id=q placeholder="рҹ”Қ жҗңзҙўд»Јз Ғ/еҗҚз§°..." oninput=load(1)>
<select id=sf onchange=load(1)>
<option value="">рҹ“Ӣ е…ЁйғЁ</option><option value=STRONG_BUY>рҹҹў вүҘ75 ејәд№°</option><option value=BUY>рҹ”ө 60-74 д№°е…Ҙ</option><option value=CAUTIOUS>рҹҹЎ 40-59 и°Ёж…Һ</option><option value=WAIT>вҡӘ <40 зӯүеҫ…</option></select>
<button class="b1 bg" onclick=refreshScore()>рҹ”„ еҲ·ж–°иҜ„еҲҶ</button>
<span class=sm id=sum></span>
</div>
<div><table><thead><tr>
<th onclick=sort(1) class=srt id=h1>#</th><th onclick=sort(2)>д»Јз Ғ</th><th onclick=sort(3)>еҗҚз§°</th><th style=color:var(--t3)>иЎҢдёҡ</th><th style=color:#2ecc71>зҺ°д»·</th><th style=color:var(--t3)>ж¶Ёи·Ңе№…</th><th onclick=sort(4)>ж ЎеҮҶеҲҶ</th><th onclick=sort(5)>еҺҹе§ӢеҲҶ</th><th style=color:var(--t3)>жқҝеқ—еӯЈиҠӮ</th>
<th onclick=sort(6) style=color:#60a5fa>и¶ӢеҠҝ</th><th onclick=sort(7) style=color:#c084fc>з»“жһ„</th>
<th onclick=sort(8) style=color:#fbbf24>еҠЁйҮҸ</th><th onclick=sort(9) style=color:#f87171>еӨ§еҚ•</th>
<th onclick=sort(10)>йҮҸжҜ”</th><th style=color:#f97316>зӣҳдёӯдҝЎеҸ·</th><th>ж“ҚдҪңе»әи®®</th>
</tr></thead><tbody id=tb></tbody></table></div>
<div class=pg id=pg></div>
</div>

</div>

<script>
const AK="90a275cbcc004fd5";
function apiFetch(u,o){if(!o)o={};if(!o.headers)o.headers={};o.headers["X-API-Key"]=AK;return fetch(u,o)}

const A='/stock-v2';let D=[],DI=1,DS='desc',PG=50;

// еёӮеңәзҠ¶жҖҒ + жқҝеқ—еӯЈиҠӮ
async function loadMarket(){
try{
const r=await apiFetch(A+'/api/v2/market-status');const d=await r.json();const m=d.data||{};
document.getElementById('topDate').textContent=m.trade_date||'';

// д»ҺAPIиҺ·еҸ–еҗ„жқҝеқ—еӯЈиҠӮпјҲзӣҙжҺҘеҸ–season_stateиЎЁпјү
const r2=await apiFetch(A+'/api/v2/board-seasons');const d2=await r2.json();const boards=d2.data||{};
const sn=m.season||'chaos';
const snMap={summer:'вҳҖпёҸ еӨҸеӯЈ',autumn:'рҹҚӮ з§ӢеӯЈ',winter:'вқ„пёҸ еҶ¬еӯЈ',spring:'рҹҢұ жҳҘеӯЈ',chaos:'рҹҢҖ ж··жІҢ',chaos_spring:'рҹҢӨпёҸ ејұжҳҘ',chaos_autumn:'вӣ… ејұз§Ӣ'};
document.getElementById('mktBadge').innerHTML='<span class="season-badge '+sn+'">'+(snMap[sn]||sn)+' '+(m.regime||'')+'</span>';

// 6ж јеёӮеңәзҠ¶жҖҒйқўжқҝпјҡж•ҙдҪ“ + 5дёӘжҢҮж•°
let mktHtml='<div class=mkt-item><div class=l>ж•ҙдҪ“вҡ–пёҸ</div><div class=v><span class="season-badge '+sn+'">'+(snMap[sn]||sn)+'</span></div></div>';
const idxOrder=['000300.SH','000001.SH','399006.SZ','399001.SZ','000688.SH'];
const idxNames={'000300.SH':'жІӘж·ұ300','000001.SH':'дёҠиҜҒ','399006.SZ':'еҲӣдёҡжқҝ','399001.SZ':'ж·ұиҜҒ','000688.SH':'з§‘еҲӣжқҝ'};
for(const code of idxOrder){
  const s=boards[code];
  if(s) mktHtml+='<div class=mkt-item><div class=l>'+idxNames[code]+'</div><div class=v><span class="season-badge '+s+'">'+(snMap[s]||s)+'</span></div></div>';
}
document.getElementById('mktGrid').innerHTML=mktHtml;

// еҗ„жқҝеқ—з»ҹи®Ў
const stats = await loadBoardStats();

// д»ҺAPIиҺ·еҸ–V13еӯЈиҠӮеҸӮж•°зҹ©йҳөпјҲеҗ«жҖ»д»“дҪҚдёҠйҷҗпјү
let strategyConfig={};
try{
  const rc=await apiFetch(A+'/api/v2/strategy/config');
  const dc=await rc.json();
  if(dc.code===0 && dc.data?.items){
    for(const item of dc.data.items){
      strategyConfig[item.season_type]={
        line:item.buy_min_score,
        hold:item.max_hold_days,
        stop:item.stop_loss_pct+'%/'+(Math.round(item.stop_loss_pct*0.75)||6)+'%',
        trail:item.trailing_stop_pct,
        maxpos:Math.round((item.max_pos_pct||10)/10),
        posPct:item.max_pos_pct,
        totalPct:item.max_total_pct||30
      };
    }
  }
}catch(e){}
// е…ңеә•й»ҳи®ӨеҖј
const sp=strategyConfig;

// дёҚеҗҢжқҝеқ—з»ҷеҮәдёҚеҗҢе»әи®®
let advItems=[];
for(const code of idxOrder){
  const s=boards[code];
  const p=sp[s]||{line:72,hold:25,stop:'10%/8%',trail:12,maxpos:6,posPct:12,totalPct:20};
  const nm=idxNames[code];
  const stat=stats?.[code]||{};
  advItems.push({name:nm,season:s,line:p.line,hold:p.hold,maxpos:p.maxpos,posPct:p.posPct,totalPct:p.totalPct,above75:stat.above75||0,cnt:stat.cnt||0});
}

// жҢүжқҝеқ—еұ•зӨәж“ҚдҪңе»әи®®
advHtml='<div style=display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:6px;margin-top:6px>';
for(const a of advItems){
  advHtml+='<div style="padding:8px;border-radius:6px;background:var(--bg4);border:1px solid var(--bd)">'+
    '<div style=font-size:.72em;color:var(--t3)><span class="season-badge '+a.season+'">'+(snMap[a.season]||a.season)+'</span> '+a.name+'</div>'+
    '<div style=font-size:.75em;margin-top:4px>д№°е…ҘвүҘ'+a.line+' | еҚ•зҘЁвүӨ'+a.posPct+'% | жҖ»д»“вүӨ'+a.totalPct+'%</div>'+
    '<div style=font-size:.72em;color:var(--accent);margin-top:2px>й«ҳеҲҶвүҘ75: '+(a.above75||0)+'/'+(a.cnt||0)+'еҸӘ | жҢҒд»“вүӨ'+a.hold+'еӨ©</div></div>';
}
advHtml+='</div>';

// д»“дҪҚеҗҲи§„жҢҮзӨәеҷЁ
advHtml+='<div style="margin-top:8px;padding:8px 10px;border-radius:6px;background:var(--bg5);border:1px solid var(--bd);font-size:.78em">\n<div style=display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px>';
advHtml+='<div style=display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px>';
advHtml+='<span><b>рҹ“Ҡ ж–№жЎҲBд»“дҪҚи§„еҲҷ</b> д№°е…ҘвүҘ75 | жҢҒжңүвүӨ30еӨ© | жӯўжҚҹ-7%/-5% | з§»еҠЁжӯўзӣҲ15% | еҚ•зҘЁвүӨ20% | жҖ»д»“вүӨ30% | еӣһж’Ө>15%иҮӘеҠЁйҷҚд»“</span>';
// и®Ўз®—еҪ“еүҚжҖ»д»“еӨ§жҰӮжҜ”дҫӢпјҲд»Һmktж•°жҚ®еҸҚжҺЁпјү
const curSeason=sn||'chaos';
const curP=sp[curSeason]||{totalPct:20};
advHtml+='<span style=color:var(--t3)>еҪ“еүҚз»ҹдёҖ75еҲҶ вҶ’ жҖ»д»“вүӨ'+curP.totalPct+'%  |  еҚ•зҘЁвүӨ20%(еҗ«5%еҒҸе·®) <span title="иў«еҠЁдёҠж¶Ёи¶…ж ҮдёҚз®—иҝқи§„;дё»еҠЁд№°е…Ҙи¶…иҪҜдёҠйҷҗ(25%)жүҚжӢҰжҲӘ">рҹ“–</span></span>';
advHtml+='</div></div>';

document.getElementById('adviceBox').innerHTML=advHtml;
}catch(e){console.log('market err',e)}
}

async function loadBoardStats(){
try{
const r=await apiFetch(A+'/api/v2/watch-pool/score-list?page=1&page_size=310');
const d=await r.json();const ss=d.data?.stocks||[];
const stats={};
for(const s of ss){
  const code=s.ts_code;
  let idx='';
  if(code.endsWith('.SH')){if(code.startsWith('688')||code.startsWith('689')) idx='000688.SH';else idx='000300.SH'}
  else if(code.endsWith('.SZ')){if(code.startsWith('30')) idx='399006.SZ';else idx='399001.SZ'}
  else idx='000300.SH'
  if(!stats[idx]) stats[idx]={cnt:0,above75:0,above60:0};
  stats[idx].cnt++;
  const sc=s.composite_score||0;
  const ca=s.calibrated_score||0;
  if(ca>=75) stats[idx].above75++;
  else if(ca>=60) stats[idx].above60++;
}
return stats;
}catch(e){return{}}
}

// иҜ„еҲҶеҲ—иЎЁ
async function load(p){
const q=document.getElementById('q').value.toLowerCase(),sf=document.getElementById('sf').value;
try{
const r=await apiFetch(A+'/api/v2/watch-pool/score-list?page='+(p||1)+'&page_size=310&keyword='+encodeURIComponent(q));
const d=await r.json();const dd=d.data||{};D=dd.stocks||[];const DT=dd.total||0;
document.getElementById('topDate').textContent='е…ұ'+DT+'еҸӘ | еј•ж“Һ: V2еҠЁйҮҸиҪЁйҒ“';
}catch(e){document.getElementById('tb').innerHTML='<tr><td colspan=13 style=text-align:center;color:var(--t3);padding:30px>еҠ иҪҪеӨұиҙҘ</td></tr>';return}

// дҝЎеҸ·иҝҮж»Ө
let arr=[...D];const sfv=document.getElementById('sf').value;
if(sfv==='STRONG_BUY')arr=arr.filter(x=>(x.calibrated_score||0)>=75);
else if(sfv==='BUY')arr=arr.filter(x=>(x.calibrated_score||0)>=60&&(x.calibrated_score||0)<75);
else if(sfv==='CAUTIOUS')arr=arr.filter(x=>(x.calibrated_score||0)>=40&&(x.calibrated_score||0)<60);
else if(sfv==='WAIT')arr=arr.filter(x=>(x.calibrated_score||0)<40);

// жҺ’еәҸ
const keys={1:'index',2:'ts_code',3:'name',4:'calibrated_score',5:'raw_score',6:'trend_score',
  7:'structure_score',8:'momentum_score',9:'mf_score',10:'vol_ratio'};
const k=keys[DI]||'composite_score';const asc=DS==='asc';
arr.sort((a,b)=>{let va=a[k]||0,vb=b[k]||0;if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase()}return asc?va>vb?1:va<vb?-1:0:va<vb?1:va>vb?-1:0});

const PG=50;const tp=Math.ceil(arr.length/PG);if(p>tp)p=tp||1;const st=(p-1)*PG,ed=st+PG,pd=arr.slice(st,ed);
document.getElementById('sum').textContent='жҳҫзӨә '+(st+1)+'-'+Math.min(ed,arr.length)+' / е…ұ'+arr.length+'жқЎ';
const tbody=document.getElementById('tb');

tbody.innerHTML=pd.map((s,i)=>{
const idx=st+i+1;const sc=s.composite_score||0;const ca=s.calibrated_score||0;const raw=s.raw_score||sc;
const tr_d=s.trend_score||0;const ss=s.structure_score||0;
const mms=s.momentum_score||0;const mfs=s.mf_score||0;
const vr=s.vol_ratio||1.0;
const snMap={summer:'вҳҖпёҸеӨҸеӯЈ',autumn:'рҹҚӮз§ӢеӯЈ',winter:'вқ„пёҸеҶ¬еӯЈ',spring:'рҹҢұжҳҘеӯЈ',chaos:'рҹҢҖж··жІҢ',chaos_spring:'рҹҢӨпёҸејұжҳҘ',chaos_autumn:'вӣ…ејұз§Ӣ'};
const seaBadge=snMap[s.season]?'<span class="season-badge '+s.season+'" style=font-size:.7em>'+snMap[s.season]+'</span>':'<span style=color:var(--t3);font-size:.72em>вҖ”</span>';

// ж“ҚдҪңе»әи®®пјҲеҹәдәҺж ЎеҮҶеҲҶпјү
let act='вҖ”',actClass='';
if(ca>=75){act='рҹҹў ејәд№°';actClass='sb1'}
else if(ca>=60){act='рҹ”ө д№°е…Ҙ';actClass='sb2'}
else if(ca>=40){act='вҡӘ жҢҒжңү';actClass='sb4'}
else{act='рҹ”ҙ еӣһйҒҝ';actClass='sb5'}

// йҮҸжҜ”йўңиүІ
const vrColor=vr<0.3?'#fca5a5':vr>3?'#fbbf24':'#6ee7b7';

return '<tr>'+
'<td style=color:var(--t3)>'+idx+'</td>'+
'<td style=color:var(--t3) title="'+(s.name||'')+'">'+s.ts_code+'</td>'+
'<td style=font-weight:600>'+(s.name||'')+'</td>'+
'<td style=font-size:.72em;color:var(--t3)>'+(s.industry||'')+'</td>'+
'<td style=font-weight:600;color:#2ecc71>' + ((s.close_price||0).toFixed(2)) + '</td>'+
'<td style=color:' + ((s.change_pct||0)>=0?'#f87171':'#16a34a') + '>' + ((s.change_pct||0)>=0?'+':'') + (s.change_pct||0).toFixed(2) + '%</td>'+
'<td><b style=font-size:1em;color:'+(ca>=75?'#6ee7b7':ca>=60?'#60a5fa':ca>=40?'#fbbf24':'#94a3b8')+'>'+ca.toFixed(1)+'</b></td>'+
'<td style=color:var(--t3)>'+sc.toFixed(1)+'</td>'+
'<td>'+seaBadge+'</td>'+
'<td>'+tr_d.toFixed(0)+'</td>'+
'<td style=color:#c084fc>'+ss.toFixed(0)+'</td>'+
'<td style=color:#fbbf24>'+mms.toFixed(0)+'</td>'+
'<td style=color:'+(mfs>=60?'#f87171':'var(--t3)')+'>'+mfs.toFixed(0)+'</td>'+
'<td style=color:'+vrColor+'>'+vr.toFixed(2)+'</td>'+
'<td><span class="sb '+(s.intraday_signal&&(s.intraday_signal.includes('д№°')||s.intraday_signal.includes('ејә'))?'sb1':s.intraday_signal&&(s.intraday_signal.includes('еҚ–')||s.intraday_signal.includes('йҖғ')||s.intraday_signal.includes('з©ә'))?'sb5':'sb4')+'" style=font-size:.7em>'+(s.intraday_signal||'вҖ”')+'</span></td>'+
'<td><span class="sb '+actClass+'" style=font-size:.7em>'+act+'</span></td>'+
