<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>еј•ж“ҺеҸӮж•° вҖ” иӮЎзҘЁжҷәиғҪеҲҶжһҗзі»з»ҹ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e1a;color:#c8d6e5;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #1e2a3a;margin-bottom:20px}
.header h1{font-size:22px;color:#fff}
.header .info{font-size:13px;color:#6b7f9e}
.card{background:linear-gradient(145deg,#141e30,#1a2744);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #1e2a3a}
.card-title{font-size:14px;color:#8a9bb5;margin-bottom:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center}

/* еёӮеңәзҠ¶жҖҒ */
.mkt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.mkt-item{background:rgba(255,255,255,0.03);border-radius:10px;padding:14px;text-align:center}
.mkt-item .lb{font-size:11px;color:#6b7f9e}
.mkt-item .val{font-size:20px;font-weight:700;margin-top:4px}

/* еҸӮж•°иЎЁ */
.param-table{width:100%;border-collapse:collapse}
.param-table th{text-align:left;padding:10px 12px;font-size:12px;color:#6b7f9e;border-bottom:1px solid #1e2a3a;font-weight:600}
.param-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(30,42,58,0.5)}
.param-table tr:hover td{background:rgba(255,255,255,0.02)}
.season-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.season-tag.summer{background:rgba(231,76,60,0.15);color:#e74c3c}
.season-tag.chaos_spring{background:rgba(243,156,18,0.15);color:#f39c12}
.season-tag.chaos{background:rgba(155,89,182,0.15);color:#9b59b6}
.season-tag.chaos_autumn{background:rgba(52,152,219,0.15);color:#3498db}
.season-tag.autumn{background:rgba(231,76,60,0.15);color:#e74c3c}
.season-tag.winter{background:rgba(149,165,166,0.15);color:#95a5a6}
.season-tag.spring{background:rgba(46,204,113,0.15);color:#2ecc71}
.season-tag.ALL{background:rgba(255,255,255,0.1);color:#fff}
.num{font-weight:700}

.loading{text-align:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid #1e2a3a;border-top-color:#3498db;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <div class="header" style=display:flex;align-items:center>
    <a href=/stock-v2/ style=color:var(--accent);text-decoration:none;font-size:.85em;margin-right:12px>вҶҗ иҝ”еӣһй©ҫй©¶иҲұ</a>
    <h1>вҡҷпёҸ еј•ж“ҺеҸӮж•°</h1>
    <span class="info" style=margin-left:auto>P6еҸҢиҪЁеј•ж“Һ В· еӯЈиҠӮеҠЁжҖҒеҸӮж•°зҹ©йҳө</span>
  </div>
  <div class="card">
    <div class="card-title">зүҲжң¬з®ЎзҗҶ</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <select id="verSelect" style="padding:8px 12px;border:1px solid #1e2a3a;border-radius:6px;background:#0d1525;color:#c8d6e5;font-size:14px;min-width:200px"><option value="">йҖүжӢ©зүҲжң¬</option></select>
      <button class="btn btn-primary" onclick="switchVersion()" style="padding:8px 16px;font-size:13px">еҲҮжҚў</button>
      <button class="btn btn-success" onclick="saveSnapshot()" style="padding:8px 16px;font-size:13px">дҝқеӯҳ</button>
    </div>
    <div id="versionInfo" style="font-size:12px;color:#6b7f9e;margin-top:8px"></div>
  </div>
  <div id="app"><div class="loading"><div class="spinner"></div><div>еҠ иҪҪеҸӮж•°дёӯ...</div></div></div>
</div>

<script>
const API = '/stock-v2/api/v2';

const SEASON_EMOJI = {summer:'вҳҖпёҸ',chaos_spring:'рҹҢӨпёҸ',chaos:'рҹҢӘпёҸ',chaos_autumn:'рҹҢҘпёҸ',autumn:'рҹҚӮ',winter:'вқ„пёҸ',spring:'рҹҢё',ALL:'рҹ“Ӣ'};
const SEASON_LABEL = {summer:'еӨҸеӯЈ(жҢҒжңү)',chaos_spring:'ејұжҳҘ(еҒҸеӨҡ)',chaos:'ж··жІҢ(и§Ӯжңӣ)',chaos_autumn:'ејұз§Ӣ(еҒҸз©ә)',autumn:'з§ӢеӯЈ(йҳІе®Ҳ)',winter:'еҶ¬еӯЈ(дј‘зң )',spring:'жҳҘеӯЈ(иҝӣж”»)',ALL:'е…ЁеұҖй»ҳи®Ө'};

function st(season) {
  const e = SEASON_EMOJI[season]||'рҹҢӘпёҸ';
  const l = SEASON_LABEL[season]||season;
  return '<span class="season-tag '+season+'">'+e+' '+l+'</span>';
}

async function load() {
  try {
    // 1. жӢүеҸ–strategy/configпјҲеӯЈиҠӮеҸӮж•°зҹ©йҳөпјү
    const [sr, dr] = await Promise.all([
      fetch(API + '/strategy/config').then(r=>r.json()),
      fetch(API + '/dashboard').then(r=>r.json())
    ]);
    
    var configs = (sr.data && sr.data.items) || sr.data || [];
    var dash = dr.data || {};
    var mkt = dash.market || {};
    var today = dash.trade_date || '--';
    var signalDist = dash.distribution || dash.signal_distribution || {};
    var totalSignals = 0; for(var k in signalDist) totalSignals += signalDist[k];
    
    var seasonEmoji = {'chaos':'рҹҢӘпёҸ','chaos_spring':'рҹҢӨпёҸ','chaos_autumn':'рҹҢҘпёҸ','summer':'вҳҖпёҸ','autumn':'рҹҚӮ','winter':'вқ„пёҸ','spring':'рҹҢё'};
    var seasonLabels = {'chaos':'ж··жІҢи§Ӯжңӣ','chaos_spring':'ејұжҳҘеҒҸеӨҡ','chaos_autumn':'ејұз§ӢеҒҸз©ә','summer':'еӨҸеӯЈжҢҒжңү','autumn':'з§ӢеӯЈйҳІе®Ҳ','winter':'еҶ¬еӯЈдј‘зң ','spring':'жҳҘеӯЈиҝӣж”»'};
    var regimeLabels = {'bull':'рҹҗӮзүӣеёӮ','bear':'рҹҗ»зҶҠеёӮ','range':'рҹ“ҠйңҮиҚЎ'};
    var scoringLabels = {'momentum':'еҠЁйҮҸиҪЁйҒ“(A)','reversion':'еӣһеҪ’иҪЁйҒ“(B)'};
    
    var html = '';
    
    // еҪ“еүҚеёӮеңәзҠ¶жҖҒ
    html += '<div class=card><div class=card-title>рҹ“Ҡ еҪ“еүҚеёӮеңәзҠ¶жҖҒ <span class=info>'+today+'</span></div>';
    html += '<div class=mkt-grid>';
    html += '<div class=mkt-item><div class=lb>еӯЈиҠӮ</div><div class=val>'+(seasonEmoji[mkt.season]||'рҹҢӘпёҸ')+' '+(seasonLabels[mkt.season]||'ж··жІҢ')+'</div></div>';
    html += '<div class=mkt-item><div class=lb>жҒ’зәӘе…ғ</div><div class=val style=font-size:16px>'+(mkt.hengji||'weak_heng')+'</div></div>';
    html += '<div class=mkt-item><div class=lb>дҪ“еҲ¶</div><div class=val>'+(regimeLabels[mkt.regime]||'рҹ“ҠйңҮиҚЎ')+'</div></div>';
    html += '<div class=mkt-item><div class=lb>иҜ„еҲҶзӯ–з•Ҙ</div><div class=val style=font-size:14px>'+(scoringLabels[dash.scoring_strategy]||'еҠЁйҮҸ')+'</div></div>';
    html += '<div class=mkt-item><div class=lb>жҢҮж•°иҜ„еҲҶ</div><div class=val style=color:'+(mkt.score>0?'#2ecc71':'#e74c3c')+'>'+Number(mkt.score||0).toFixed(1)+'</div></div>';
    html += '<div class=mkt-item><div class=lb>зҪ®дҝЎеәҰ</div><div class=val>'+Number((mkt.confidence||0.5)*100).toFixed(0)+'%</div></div>';
    html += '</div></div>';
    
    // дҝЎеҸ·еҲҶеёғжҰӮиҰҒ
    html += '<div class=card><div class=card-title>рҹ“Ҳ дҝЎеҸ·еҲҶеёғ <span class=info>'+totalSignals+'еҸӘе·ІиҜ„еҲҶ</span></div><div style=display:flex;gap:16px;flex-wrap:wrap>';
    var items = [['strong_buy','ејәд№°','#2ecc71'],['buy','д№°е…Ҙ','#3498db'],['hold','жҢҒжңү','#f39c12'],['wait','зӯүеҫ…','#6b7f9e']];
    for(var i=0;i<items.length;i++){
      var v = signalDist[items[i][0]]||0;
      if(v>0)html += '<div style="flex:1;min-width:70px;text-align:center;padding:10px;border-radius:8px;background:'+items[i][2]+'15;border:1px solid '+items[i][2]+'30"><div style=font-size:20px;font-weight:700;color:'+items[i][2]+'>'+v+'</div><div style=font-size:11px;color:#8a9bb5>'+items[i][1]+'</div></div>';
    }
    html += '</div></div>';
    
    // еӯЈиҠӮеҸӮж•°зҹ©йҳө
    html += '<div class=card><div class=card-title>рҹ—ӮпёҸ еӯЈиҠӮеҸӮж•°зҹ©йҳө</div>';
    html += '<table class=param-table><tr><th>еӯЈиҠӮ</th><th>зӯ–з•ҘеҗҚз§°</th><th>д№°е…ҘйҳҲеҖј</th><th>еҚ•еҸӘд»“дҪҚ</th><th>жҖ»д»“дҪҚдёҠйҷҗ</th><th>жӯўжҚҹ</th><th>жӯўзӣҲеӣһж’Ө</th><th>еҶ·еҚҙж—Ҙ</th><th>жңҖеӨ§жҢҒжңү</th><th>жЈҖи§ҶзӮ№P1/P2/P3</th></tr>';
    
    // жҢүйЎәеәҸжҺ’еҲ—
    var order = ['ALL','summer','chaos_spring','spring','chaos','chaos_autumn','autumn','winter'];
    for(var oi=0;oi<order.length;oi++){
      var sid = order[oi];
      var cfg = null;
      for(var ci=0;ci<configs.length;ci++){
        if(configs[ci].season_type === sid) { cfg = configs[ci]; break; }
      }
      if(cfg) {
        var em = SEASON_EMOJI[sid]||'';
        var lb = SEASON_LABEL[sid]||sid;
        // е…је®№ж–°ж—§APIж јејҸ
        var p = cfg.params || cfg;
        html += '<tr>';
        html += '<td>'+st(sid)+'</td>';
        html += '<td>'+(cfg.name||'')+'</td>';
        html += '<td class=num>вүҘ'+(p.buy_min_score||80)+'еҲҶ</td>';
        html += '<td class=num style=color:'+((p.max_pos_pct||5)>=30?'#2ecc71':'#f39c12')+'>'+(p.max_pos_pct||5)+'%</td>';
        html += '<td class=num style=color:'+((p.max_total_pct||30)>=35?'#2ecc71':'#f39c12')+'>'+(p.max_total_pct||30)+'%</td>';
        html += '<td class=num style=color:#e74c3c>-'+Number(p.stop_loss_pct||8).toFixed(0)+'%</td>';
        html += '<td class=num style=color:#2ecc71>'+Number(p.trailing_stop_pct||12).toFixed(0)+'%</td>';
        html += '<td class=num>'+(p.cool_days||15)+'ж—Ҙ</td>';
        html += '<td class=num>'+(p.max_hold_days||20)+'ж—Ҙ</td>';
        html += '<td class=num>'+(p.p1_score||10)+'/'+(p.p2_score||20)+'/'+(p.p3_score||30)+'</td>';
        html += '</tr>';
      }
    }
    html += '</table></div>';
    
    // еј•ж“ҺиҜҙжҳҺ
    html += '<div class=card><div class=card-title>рҹ§  еј•ж“ҺиҜҙжҳҺ</div>';
    html += '<div style=font-size:13px;color:#8a9bb5;line-height:1.8>';
    html += '<p><b>иҜ„еҲҶеј•ж“Һпјҡ</b>P6еҸҢиҪЁеј•ж“ҺпјҲеҠЁйҮҸиҪЁйҒ“A / еӣһеҪ’иҪЁйҒ“Bпјү</p>';
    html += '<p><b>иҜ„еҲҶиҢғеӣҙпјҡ</b>з»јеҗҲеҲҶ 0~100пјҢж ЎеҮҶеҲҶ 0~80</p>';
    html += '<p><b>д№°е…ҘйҖ»иҫ‘пјҡ</b>жҜҸж—ҘиҜ„еҲҶвүҘд№°е…ҘйҳҲеҖј + иҜ„еҲҶжҺ’еәҸTop N + еҚ•зҘЁвүӨжҖ»иө„йҮ‘Г—еҚ•зҘЁдёҠйҷҗ% + жҖ»д»“вүӨеӯЈиҠӮжҖ»д»“дёҠйҷҗ%</p>';
    html += '<p><b>ж–№жЎҲCпјҲеҪ“еүҚе®һиЈ…пјүпјҡ</b>д№°е…Ҙз”ЁжҖ»иө„йҮ‘з®—еҚ•зҘЁдёҠйҷҗ(дёҚжҳҜзҺ°йҮ‘) + жҖ»д»“дҪҚзЎ¬дёҠйҷҗдҝқжҠӨ + еӣһж’Өи¶…15%иҮӘеҠЁйҷҚд»“25%</p>';
    html += '<p><b>жҢҒд»“йҖ»иҫ‘пјҡ</b>жЈҖи§ҶзӮ№жЈҖжҹҘ(5/10/20/30ж—Ҙ) + жӯўжҚҹ(-T1%) + з§»еҠЁжӯўзӣҲ(15%еӣһж’Ө) + жңҖеӨ§жҢҒжңүXж—Ҙ(жҢүеӯЈиҠӮ)</p>';
    html += '<p><b>еҶ·еҚҙжңҹпјҡ</b>еҚ–еҮәеҗҺеҗҢдёҖеҸӘиӮЎзҘЁж— жі•з«ӢеҚіеҶҚд№°</p>';
    html += '<p><b>еӯЈиҠӮеҲҮжҚўпјҡ</b>жҜҸеӨ©ж №жҚ®SeasonEngineиҮӘеҠЁеҲӨж–ӯеёӮеңәзҠ¶жҖҒпјҢйҖүжӢ©еҜ№еә”еӯЈиҠӮзҡ„еҸӮж•°</p>';
    html += '</div></div>';
    
    document.getElementById('app').innerHTML = html;
  } catch(e) {
    document.getElementById('app').innerHTML = '<div style=text-align:center;padding:40px;color:#e74c3c>еҠ иҪҪеӨұиҙҘ: '+e.message+'</div>';
  }
}

load();


function loadVer(){
  var sel = document.getElementById('verSelect');
  fetch('/stock-v2/api/v2/strategy/versions').then(function(r){return r.json()}).then(function(d){
    var vs = d.data?.versions || [];
    sel.innerHTML = '<option value="">йҖүжӢ©зүҲжң¬</option>';
    for(var i=0;i<vs.length;i++){
      sel.innerHTML += '<option value="'+vs[i].version+'">V'+vs[i].version+'</option>';
    }
    var info = document.getElementById('versionInfo');
    if(info && vs.length>0) info.innerHTML = 'еҪ“еүҚV'+vs[0].version;
  });
}
function switchVersion(){
  var sel = document.getElementById('verSelect'), ver = sel.value;
  if(!ver||ver==''){alert('йҖүзүҲжң¬');return}
  if(!confirm('еҲҮеҲ°V'+ver+'?'))return;
  fetch('/stock-v2/api/v2/strategy/version/'+ver+'/apply',{method:'POST'}).then(function(r){return r.json()}).then(function(d){
    if(d.code===0){alert('е·ІеҲҮеҲ°V'+ver);location.reload()}
    else{alert('еӨұиҙҘ')}
  });
}
function saveSnapshot(){
  fetch('/stock-v2/api/v2/strategy/version/snapshot',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(function(r){return r.json()}).then(function(d){
    if(d.code===0){alert('е·ІдҝқеӯҳV'+d.data.version);location.reload()}
    else{alert('еӨұиҙҘ')}
  });
}
loadVer();
</script>
</body>
</html>
